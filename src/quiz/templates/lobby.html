<!doctype html>
<html>
<head>
    {% load static %}
    <script src="{% static 'js/sse.js' %}"> </script>
</head>

<body>
	<h1>Welcome team {{ cur_team.team_name }} </h1>
	<h2>Your team leader is {{ cur_team.team_leader }} </h2>
	<p>Your competition:</p>
	<div id="team-list">
		{% include "teams/list.html" %}
	</div>
</body>

<script>
sse.addEventListener("update", async (e) => {
	let ev = JSON.parse(e.data);
	if (ev.type == "teams") {
		console.log(`Refreshing teams list`);
		await refreshTeamsList();
	}
	else {
		console.log(`Got unrecognised event type: ${ev.type}`);
	}
});

const refreshTeamsList = async () => {
	const res = await fetch("/teams/list");
	const html = await res.text();

	document.querySelector("#team-list").innerHTML = html;
};


</script>
</html>
